name: Build BCM2712 kernel RPMs

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 0"  # weekly — kernel packages don't change often
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Query available kernel version from repos
        id: query
        run: |
          BASE_IMAGE=$(awk '/^FROM.*AS builder/{print $2; exit}' Containerfile)
          VERSION=$(docker run --rm "$BASE_IMAGE" \
            dnf repoquery --source --qf '%{VERSION}-%{RELEASE}' raspberrypi2-kernel4 2>/dev/null | tail -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Available: $VERSION"

      - name: Check currently published version
        id: check
        run: |
          CURRENT=$(skopeo inspect "docker://${{ env.IMAGE }}:latest" 2>/dev/null \
            | jq -r '.Labels["kernel.version"] // ""')
          AVAILABLE="${{ steps.query.outputs.version }}"
          echo "Current:   ${CURRENT:-none}"
          echo "Available: $AVAILABLE"
          if [ -n "$AVAILABLE" ] && [ "$CURRENT" = "$AVAILABLE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version unchanged — skipping build"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.IMAGE }}:latest
          labels: kernel.version=${{ steps.query.outputs.version }}
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        if: steps.check.outputs.skip != 'true' && github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image
        if: steps.check.outputs.skip != 'true' && github.event_name != 'pull_request'
        run: cosign sign --yes "${{ env.IMAGE }}:latest"
