name: Build BCM2712 kernel RPMs

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 0"  # weekly — kernel packages don't change often
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2  # need parent commit to diff against for push events

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Query available kernel version from repos
        id: query
        run: |
          BASE_IMAGE=$(awk '/^FROM.*AS builder/{print $2; exit}' Containerfile)
          VERSION=$(docker run --rm "$BASE_IMAGE" \
            dnf -y repoquery --source --qf '%{VERSION}-%{RELEASE}' raspberrypi2-kernel4 2>/dev/null | tail -1)
          if ! [[ "$VERSION" =~ ^[0-9] ]]; then
            echo "::error::repoquery returned something that doesn't look like a version: '$VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Available: $VERSION"

      - name: Check currently published version
        id: check
        run: |
          CURRENT=$(skopeo inspect "docker://${{ env.IMAGE }}:latest" 2>/dev/null \
            | jq -r '.Labels["kernel.version"] // ""')
          AVAILABLE="${{ steps.query.outputs.version }}"
          echo "Current:   ${CURRENT:-none}"
          echo "Available: $AVAILABLE"

          SKIP=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            : # manual trigger — always rebuild
          elif [ "${{ github.event_name }}" = "push" ]; then
            # Skip only if the Containerfile has no functional changes (i.e. just a digest
            # bump from Renovate) AND the kernel version is unchanged.
            FUNCTIONAL=$(git diff HEAD~1 HEAD -- Containerfile \
              | grep -E '^[+-]' | grep -vE '^[+-]{3}' \
              | grep -vE '^[+-]FROM .+@sha256:[a-f0-9]+' | wc -l | tr -d ' ')
            if [ "$FUNCTIONAL" -eq 0 ] && [ -n "$AVAILABLE" ] && [ "$CURRENT" = "$AVAILABLE" ]; then
              SKIP=true
            fi
          else
            # schedule — skip if version unchanged
            [ -n "$AVAILABLE" ] && [ "$CURRENT" = "$AVAILABLE" ] && SKIP=true
          fi

          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          [ "$SKIP" = "true" ] && echo "Version unchanged — skipping build" || true

      - name: Set up Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.IMAGE }}:latest
          labels: kernel.version=${{ steps.query.outputs.version }}
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        if: steps.check.outputs.skip != 'true' && github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image
        if: steps.check.outputs.skip != 'true' && github.event_name != 'pull_request'
        run: cosign sign --yes "${{ env.IMAGE }}:latest"
